  - Broadband
  - Cable TV
  - Internet
  - Phone
  - Account Management
  - Network Diagnostics
apis:
  - aid: cox:cox-account-management-api
    name: Cox Account Management API
    description: REST API for managing Cox customer accounts, including service subscriptions, billing information, user profiles, and service feature configuration for broadband, cable TV, and phone services.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.cox.com/business/support/myaccount.html
    baseURL: https://myaccount-business.cox.com/api
    tags:
      - Account Management
      - Customer Portal
      - Billing
      - Subscriptions
    properties:
      - type: Documentation
        url: https://www.cox.com/business/support/account-services.html
  - aid: cox:cox-network-diagnostics-api
    name: Cox Network Diagnostics API
    description: REST API providing network diagnostic tools for Cox broadband subscribers, enabling troubleshooting of connectivity issues, signal level monitoring, equipment status checks, and service health assessments.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.cox.com/business/support/home.html
    baseURL: https://www.cox.com/webapi
    tags:
      - Network Diagnostics
      - Broadband
      - Troubleshooting
      - Connectivity
    properties:
      - type: Documentation
        url: https://www.cox.com/business/support/home.html
  - aid: cox:cox-business-services-api
    name: Cox Business Services API
    description: REST API for Cox Business customers to manage voice, internet, and cloud connectivity services, including configuration of business phone systems, bandwidth management, and cloud networking options.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.cox.com/business/home.html
    baseURL: https://myaccount.coxbusiness.com/cbma
    tags:
      - Business Services
      - Voice
      - Cloud Connectivity
      - Managed Services
    properties:
      - type: Documentation
        url: https://www.cox.com/business/learn/starthere.html
